<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeleMeet Bot Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #343a40;
        }
        .navbar-brand {
            color: #fff;
            font-weight: bold;
        }
        .card {
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .card-header {
            background-color: #343a40;
            color: #fff;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0069d9;
            border-color: #0062cc;
        }
        .btn-success {
            background-color: #28a745;
            border-color: #28a745;
        }
        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status-online {
            background-color: #28a745;
        }
        .status-offline {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-robot"></i>
                TeleMeet Bot Control Panel
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mt-3" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="row">
            <div class="col-md-6">
                <div class="card mt-4">
                    <div class="card-header">
                        <i class="fab fa-telegram-plane"></i>
                        Telegram Bot
                        <span id="telegram-status" class="status-indicator status-offline float-end"></span>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('save_token') }}" method="post" class="row g-3 align-items-center">
                            <div class="col-auto">
                                <label for="token" class="visually-hidden">Telegram Bot Token</label>
                                <input type="password" class="form-control" id="token" name="token" placeholder="Telegram Bot Token" value="{{ telegram_token }}">
                            </div>
                            <div class="col-auto">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i>
                                    Save Token
                                </button>
                            </div>
                        </form>
                        <form action="{{ url_for('connect_bot') }}" method="post" class="mt-2">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-plug"></i>
                                Connect Bot
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mt-4">
                    <div class="card-header">
                        <i class="fas fa-video"></i>
                        Google Meet Control
                        <span id="selenium-status" class="status-indicator status-offline float-end"></span>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('deploy') }}" method="post">
                            <div class="mb-3">
                                <label for="meet_url" class="form-label">Google Meet URL</label>
                                <input type="url" class="form-control" id="meet_url" name="meet_url" value="{{ meet_url }}">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-rocket"></i>
                                Deploy Bot to Meet
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card mt-4">
                    <div class="card-header">
                        <i class="fab fa-youtube"></i>
                        YouTube Control
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('play') }}" method="post">
                            <div class="mb-3">
                                <label for="youtube_url" class="form-label">YouTube Video URL</label>
                                <input type="url" class="form-control" id="youtube_url" name="youtube_url" value="{{ youtube_url }}">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-play"></i>
                                Play Video in Meet
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mt-4">
                    <div class="card-header">
                        <i class="fas fa-stop-circle"></i>
                        Stop Automation
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('stop') }}" method="post">
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-hand-paper"></i>
                                Stop Bot & Leave Meet
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateStatus() {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const telegramStatus = document.getElementById('telegram-status');
                    const seleniumStatus = document.getElementById('selenium-status');

                    if (data.telegram_bot === 'online') {
                        telegramStatus.classList.remove('status-offline');
                        telegramStatus.classList.add('status-online');
                    } else {
                        telegramStatus.classList.remove('status-online');
                        telegramStatus.classList.add('status-offline');
                    }

                    if (data.selenium_automation === 'online') {
                        seleniumStatus.classList.remove('status-offline');
                        seleniumStatus.classList.add('status-online');
                    } else {
                        seleniumStatus.classList.remove('status-online');
                        seleniumStatus.classList.add('status-offline');
                    }
                });
        }

        setInterval(updateStatus, 5000);
        updateStatus();
    </script>
</body>
</html>
