<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeleMeet Bot Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5">
      <h1>TeleMeet Bot Control Panel</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} mt-3" role="alert">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div class="card mt-4">
        <div class="card-body">
          <h5 class="card-title">Telegram Bot</h5>
          <form action="{{ url_for('save_token') }}" method="post" class="row g-3 align-items-center">
            <div class="col-auto">
              <label for="token" class="visually-hidden">Telegram Bot Token</label>
              <input type="password" class="form-control" id="token" name="token" placeholder="Telegram Bot Token" value="{{ telegram_token }}">
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary">Save Token</button>
            </div>
          </form>
          <form action="{{ url_for('connect_bot') }}" method="post" class="mt-2">
            <button type="submit" class="btn btn-success">Connect Bot</button>
          </form>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-body">
          <h5 class="card-title">Google Meet Control</h5>
          <form action="{{ url_for('deploy') }}" method="post">
            <div class="mb-3">
              <label for="meet_url" class="form-label">Google Meet URL</label>
              <input type="url" class="form-control" id="meet_url" name="meet_url" value="{{ meet_url }}">
            </div>
            <button type="submit" class="btn btn-primary">Deploy Bot to Meet</button>
          </form>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-body">
          <h5 class="card-title">YouTube Control</h5>
          <form action="{{ url_for('play') }}" method="post">
            <div class="mb-3">
              <label for="youtube_url" class="form-label">YouTube Video URL</label>
              <input type="url" class="form-control" id="youtube_url" name="youtube_url" value="{{ youtube_url }}">
            </div>
            <button type="submit" class="btn btn-primary">Play Video in Meet</button>
          </form>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-body">
            <h5 class="card-title">Stop Automation</h5>
            <form action="{{ url_for('stop') }}" method="post">
                <button type="submit" class="btn btn-danger">Stop Bot & Leave Meet</button>
            </form>
        </div>
      </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
